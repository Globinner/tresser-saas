<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1a1a1f"/>
  <g transform="translate(256,256)">
    <!-- Left scissor blade -->
    <path d="M-40,-180 L40,-20 L20,0 L-60,-160 Z" fill="#d4a853" transform="rotate(-15)"/>
    <circle cx="-30" cy="120" r="45" fill="none" stroke="#d4a853" stroke-width="16" transform="rotate(-15)"/>
    <circle cx="-30" cy="120" r="20" fill="#1a1a1f" transform="rotate(-15)"/>
    
    <!-- Right scissor blade -->
    <path d="M40,-180 L-40,-20 L-20,0 L60,-160 Z" fill="#d4a853" transform="rotate(15)"/>
    <circle cx="30" cy="120" r="45" fill="none" stroke="#d4a853" stroke-width="16" transform="rotate(15)"/>
    <circle cx="30" cy="120" r="20" fill="#1a1a1f" transform="rotate(15)"/>
    
    <!-- Center pivot -->
    <circle cx="0" cy="-40" r="12" fill="#d4a853"/>
  </g>
</svg>
